apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: simple-java-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: simple-app.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: simple-java-service
            port:
              number: 80
